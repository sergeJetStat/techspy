<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechSpy — Site Profile</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0a0d14;
      --surface: #111827;
      --border:  #1f2937;
      --accent:  #6366f1;
      --green:   #10b981;
      --red:     #ef4444;
      --yellow:  #f59e0b;
      --text:    #f9fafb;
      --muted:   #9ca3af;
      --card:    #161d2e;
    }
    body { font-family: system-ui,-apple-system,sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* NAV */
    nav { display: flex; align-items: center; gap: 16px; padding: 12px 24px; border-bottom: 1px solid var(--border); background: rgba(10,13,20,.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10; }
    .logo { font-size: 1.1rem; font-weight: 800; background: linear-gradient(90deg,#6366f1,#8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .logo span { -webkit-text-fill-color: #10b981; }
    .back-link { display: flex; align-items: center; gap: 6px; font-size: .85rem; color: var(--muted); text-decoration: none; padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px; transition: all .15s; }
    .back-link:hover { color: var(--text); border-color: var(--accent); }
    .back-link svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* MAIN */
    main { max-width: 960px; margin: 0 auto; padding: 32px 24px 64px; }

    /* LOADING / ERROR */
    .state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; gap: 16px; color: var(--muted); }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-icon { font-size: 3rem; }

    /* HERO */
    .hero { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 32px; }
    .favicon { width: 52px; height: 52px; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
    .favicon img { width: 32px; height: 32px; }
    .favicon-placeholder { font-size: 1.4rem; }
    .hero-info { flex: 1; min-width: 0; }
    .hero-domain { font-size: 2rem; font-weight: 800; letter-spacing: -.02em; word-break: break-all; }
    .hero-meta { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }
    .meta-pill { display: inline-flex; align-items: center; gap: 5px; font-size: .78rem; color: var(--muted); background: var(--surface); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px; }
    .meta-pill .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-active { background: var(--green); }
    .dot-error  { background: var(--red); }
    .dot-pending{ background: var(--yellow); }
    .hero-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: .85rem; font-weight: 600; text-decoration: none; border: none; cursor: pointer; transition: all .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #4f52de; }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn svg { width: 14px; height: 14px; }

    /* SUMMARY CARDS */
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 32px; }
    .summary-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; }
    .summary-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
    .summary-value { font-size: 1.7rem; font-weight: 800; }
    .summary-value.accent { color: var(--accent); }
    .summary-sub { font-size: .75rem; color: var(--muted); margin-top: 2px; }

    /* TECH CATEGORIES */
    .section { margin-bottom: 28px; }
    .section-title { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .tech-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
    .tech-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; transition: border-color .15s; }
    .tech-card:hover { border-color: var(--accent); }
    .tech-icon { width: 32px; height: 32px; border-radius: 8px; background: rgba(99,102,241,.12); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1rem; }
    .tech-info { flex: 1; min-width: 0; }
    .tech-name { font-size: .9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tech-name a { color: var(--text); text-decoration: none; }
    .tech-name a:hover { color: var(--accent); }
    .tech-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
    .tech-version { font-size: .72rem; color: var(--muted); background: var(--card); padding: 1px 6px; border-radius: 4px; border: 1px solid var(--border); }
    .conf-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .conf-fill { height: 100%; border-radius: 2px; transition: width .3s; }
    .conf-text { font-size: .7rem; color: var(--muted); white-space: nowrap; }

    /* CATEGORY ICONS MAP */
    .cat-icon { font-size: .9rem; }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .hero-domain { font-size: 1.4rem; }
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .tech-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="logo">Tech<span>Spy</span></a>
  <a href="/search.html" class="back-link">
    <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/></svg>
    Back to Search
  </a>
</nav>

<main id="main">
  <div class="state-box" id="loading">
    <div class="spinner"></div>
    <div>Loading site profile…</div>
  </div>
  <div class="state-box" id="error" style="display:none">
    <div class="error-icon">🔍</div>
    <div style="font-size:1.1rem;font-weight:600;">Site not found</div>
    <div id="errMsg" style="font-size:.85rem;"></div>
    <a href="/search.html" class="btn btn-outline" style="margin-top:8px;">← Back to search</a>
  </div>
  <div id="content" style="display:none"></div>
</main>

<script>
// Category → emoji icon
const CAT_ICONS = {
  'Analytics':            '📊',
  'Advertising':          '📣',
  'Tag Manager':          '🏷️',
  'CMS':                  '📝',
  'E-commerce':           '🛒',
  'JavaScript Framework': '⚛️',
  'JavaScript Library':   '📦',
  'CSS Framework':        '🎨',
  'UI Library':           '🎨',
  'Static Site Generator':'⚡',
  'Build Tool':           '🔧',
  'Web Server':           '🖥️',
  'CDN':                  '🌐',
  'Hosting':              '☁️',
  'Cloud':                '☁️',
  'Database':             '🗄️',
  'Security':             '🔒',
  'Authentication':       '🔑',
  'Payment':              '💳',
  'Mapping':              '🗺️',
  'Live Chat':            '💬',
  'Customer Support':     '🎧',
  'CRM':                  '👥',
  'Email Marketing':      '📧',
  'SEO':                  '🔍',
  'Mobile':               '📱',
  'Social':               '🤝',
  'A/B Testing':          '🧪',
  'Forms':                '📋',
  'Monitoring':           '📡',
  'Error Tracking':       '🐛',
  'Search':               '🔎',
  'Runtime':              '⚙️',
  'Programming Language': '💻',
  'API':                  '🔗',
  'Communication':        '📞',
};

function catIcon(cat) {
  return CAT_ICONS[cat] || '🔧';
}

function confColor(c) {
  if (c >= 90) return '#10b981';
  if (c >= 70) return '#6366f1';
  if (c >= 50) return '#f59e0b';
  return '#ef4444';
}

function formatDate(iso) {
  if (!iso) return '—';
  try {
    return new Date(iso).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
  } catch { return iso.slice(0,10); }
}

function getDomain() {
  const p = window.location.pathname; // /site/gismeteo.ru
  const match = p.match(/^\/site\/(.+)$/);
  return match ? decodeURIComponent(match[1]) : null;
}

async function load() {
  const domain = getDomain();
  if (!domain) {
    showError('No domain specified in URL');
    return;
  }
  document.title = `TechSpy — ${domain}`;

  try {
    const res = await fetch(`/api/site/${domain}`);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      showError(err.detail || `HTTP ${res.status}`);
      return;
    }
    const data = await res.json();
    render(data);
  } catch (e) {
    showError(e.message);
  }
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('errMsg').textContent = msg;
  document.getElementById('error').style.display = 'flex';
}

function render(d) {
  document.getElementById('loading').style.display = 'none';
  const el = document.getElementById('content');
  el.style.display = 'block';

  const statusDot = d.status === 'active' ? 'dot-active' : d.status === 'error' ? 'dot-error' : 'dot-pending';
  const statusLabel = d.status || 'unknown';

  // Group categories in priority order
  const CAT_ORDER = ['Analytics','Advertising','Tag Manager','CMS','E-commerce',
    'JavaScript Framework','JavaScript Library','CSS Framework','UI Library',
    'Static Site Generator','Build Tool','Web Server','CDN','Hosting','Cloud',
    'Database','Security','Authentication','Payment','Mapping','Live Chat',
    'Customer Support','CRM','Email Marketing','SEO','Mobile','Social',
    'A/B Testing','Forms','Monitoring','Error Tracking','Search','Programming Language',
    'Runtime','API','Communication'];

  const bycat = d.by_category || {};
  const allCats = [...new Set([...CAT_ORDER, ...Object.keys(bycat)])].filter(c => bycat[c]);

  const techSections = allCats.map(cat => {
    const techs = bycat[cat];
    if (!techs || !techs.length) return '';
    const cards = techs.map(t => {
      const color = confColor(t.confidence);
      const versionTag = t.version ? `<span class="tech-version">v${t.version}</span>` : '';
      const nameContent = t.website
        ? `<a href="${t.website}" target="_blank" rel="noopener">${t.name}</a>`
        : t.name;
      return `
        <div class="tech-card">
          <div class="tech-icon">${catIcon(cat)}</div>
          <div class="tech-info">
            <div class="tech-name">${nameContent}</div>
            <div class="tech-meta">
              ${versionTag}
              <div class="conf-bar"><div class="conf-fill" style="width:${t.confidence}%;background:${color}"></div></div>
              <span class="conf-text">${t.confidence}%</span>
            </div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="section">
        <div class="section-title">${catIcon(cat)} ${cat} <span style="color:var(--accent);font-size:.75rem;-webkit-text-fill-color:var(--accent)">${techs.length}</span></div>
        <div class="tech-grid">${cards}</div>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="hero">
      <div class="favicon">
        <img src="https://www.google.com/s2/favicons?domain=${d.domain}&sz=32"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
             alt="">
        <span class="favicon-placeholder" style="display:none">🌐</span>
      </div>
      <div class="hero-info">
        <div class="hero-domain">${d.domain}</div>
        <div class="hero-meta">
          <span class="meta-pill"><span class="dot ${statusDot}"></span>${statusLabel} · HTTP ${d.status_code || '—'}</span>
          <span class="meta-pill">🕐 Crawled: ${formatDate(d.last_crawled)}</span>
          <span class="meta-pill">📅 First seen: ${formatDate(d.first_seen)}</span>
          <span class="meta-pill">🏆 Tier ${d.crawl_tier || '—'}</span>
        </div>
        <div class="hero-actions">
          <a href="https://${d.domain}" target="_blank" rel="noopener" class="btn btn-primary">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z"/><path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z"/></svg>
            Visit site
          </a>
          <button class="btn btn-outline" onclick="copyDomain('${d.domain}')">
            <svg viewBox="0 0 20 20" fill="currentColor"><path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/><path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/></svg>
            <span id="copyBtn">Copy domain</span>
          </button>
          <a href="/search.html" class="btn btn-outline">← Search</a>
        </div>
      </div>
    </div>

    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-label">Technologies</div>
        <div class="summary-value accent">${d.tech_count}</div>
        <div class="summary-sub">detected</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Categories</div>
        <div class="summary-value">${allCats.length}</div>
        <div class="summary-sub">categories</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Status</div>
        <div class="summary-value" style="font-size:1.2rem;text-transform:capitalize">${statusLabel}</div>
        <div class="summary-sub">HTTP ${d.status_code || '—'}</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Last crawled</div>
        <div class="summary-value" style="font-size:1rem;font-weight:600">${formatDate(d.last_crawled)}</div>
        <div class="summary-sub">since ${formatDate(d.first_seen)}</div>
      </div>
    </div>

    ${d.tech_count === 0
      ? '<div class="state-box" style="min-height:200px"><div style="font-size:2rem">🤷</div><div>No technologies detected for this site</div></div>'
      : techSections}
  `;
}

function copyDomain(domain) {
  navigator.clipboard.writeText(domain).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy domain'; }, 1500);
  });
}

load();
</script>
</body>
</html>
